<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Nexum OS Control</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--tg-theme-bg-color, #0d1117);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-card {
            background-color: var(--tg-theme-secondary-bg-color, #21262d);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8b949e);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #58a6ff);
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 24px;
            background-color: var(--tg-theme-button-color, #238636);
            color: var(--tg-theme-button-text-color, #ffffff);
            text-align: center;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🔱 NEXUM CORE OS</h2>
        <p style="color: var(--tg-theme-hint-color)">Real-time Status Monitor</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">المعالج (CPU)</div>
            <div class="stat-value" id="cpu-val">--%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">الذاكرة (RAM)</div>
            <div class="stat-value" id="ram-val">--%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">وكلاء تعمل</div>
            <div class="stat-value" id="agents-val">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">حالة الشبكة</div>
            <div class="stat-value" style="color: #3fb950">Online</div>
        </div>
    </div>

    <button class="btn-primary" onclick="closeApp()">العودة وتطبيق التغييرات</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.enableClosingConfirmation();

        // الاتصال بـ WebSocket لجلب البيانات الحية
        const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${wsProto}://${location.host}/ws/live`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('cpu-val').innerText = `${data.cpu.toFixed(1)}%`;
            document.getElementById('ram-val').innerText = `${data.ram.toFixed(1)}%`;
            if (data.agents_online !== undefined) {
                document.getElementById('agents-val').innerText = data.agents_online;
            }
        };

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
