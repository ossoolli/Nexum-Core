<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUM OS | Dashboard</title>
    <style>
        :root { --bg: #0a0a0c; --card: #16161a; --accent: #00f2ff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .accent { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
        .sync-badge { background: #004400; color: #0f0; padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #0f0; }
        .card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NEXUM <span class="accent">PRIME</span></h1>
        <div class="sync-badge">System Synced with Cloud ✔️</div>
    </div>
    <div class="card">
        <h3 class="accent">حالة النظام الحيّة</h3>
        <p>مرحباً بك في قمرة القيادة السيادية. جميع الأنظمة تعمل بكفاءة.</p>
    </div>
</body>
</html>
