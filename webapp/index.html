<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUM PRIME | Sovereign Control Plane</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Alpine.js for lightweight reactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tg_bg: 'var(--tg-theme-bg-color, #0f172a)',
                        tg_text: 'var(--tg-theme-text-color, #f8fafc)',
                        tg_hint: 'var(--tg-theme-hint-color, #94a3b8)',
                        tg_link: 'var(--tg-theme-link-color, #3b82f6)',
                        tg_btn: 'var(--tg-theme-button-color, #2563eb)',
                        tg_btn_text: 'var(--tg-theme-button-text-color, #ffffff)',
                        brand: {
                            glow: '#00f2fe',
                            dark: '#0a0f1d'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.tg_bg');
            color: theme('colors.tg_text');
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .agent-status-glow {
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body class="antialiased min-h-screen" x-data="nexumApp()">

    <!-- Header Navigation -->
    <header class="sticky top-0 z-50 glass-card border-b border-slate-800 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-brand-glow/20 flex items-center justify-center border border-brand-glow/50">
                <i data-lucide="cpu" class="w-4 h-4 text-brand-glow"></i>
            </div>
            <h1 class="font-bold tracking-wider text-sm">NEXUM PRIME</h1>
        </div>
        <div class="flex gap-3">
            <button @click="currentTab = 'agents'" :class="currentTab === 'agents' ? 'text-brand-glow' : 'text-tg_hint'">
                <i data-lucide="network" class="w-5 h-5"></i>
            </button>
            <button @click="currentTab = 'sandbox'" :class="currentTab === 'sandbox' ? 'text-brand-glow' : 'text-tg_hint'">
                <i data-lucide="box" class="w-5 h-5"></i>
            </button>
            <button @click="currentTab = 'terminal'" :class="currentTab === 'terminal' ? 'text-brand-glow' : 'text-tg_hint'">
                <i data-lucide="terminal" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-4 space-y-6 pb-24">
        
        <!-- Tab: Agents Control Center -->
        <div x-show="currentTab === 'agents'" x-transition>
            <h2 class="text-xs font-semibold text-tg_hint uppercase tracking-widest mb-4">Agent Control Center</h2>
            
            <div class="space-y-4">
                <template x-for="agent in agents" :key="agent.id">
                    <div class="glass-card rounded-xl p-4 transition-all duration-300 hover:agent-status-glow">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center relative">
                                    <i :data-lucide="agent.icon" class="w-5 h-5 text-slate-300"></i>
                                    <span class="absolute -top-1 -right-1 w-3 h-3 rounded-full border-2 border-slate-900"
                                          :class="agent.status === 'ACTIVE' ? 'bg-green-500' : 'bg-amber-500'"></span>
                                </div>
                                <div>
                                    <h3 class="font-medium text-sm text-tg_text" x-text="agent.name"></h3>
                                    <p class="text-xs text-tg_hint" x-text="agent.role"></p>
                                </div>
                            </div>
                            <span class="text-[10px] px-2 py-1 rounded bg-slate-800 text-slate-300 font-mono" x-text="agent.runtime"></span>
                        </div>
                        
                        <!-- Capabilities -->
                        <div class="flex flex-wrap gap-1.5 mb-4">
                            <template x-for="cap in agent.capabilities">
                                <span class="text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded border border-slate-700 text-slate-400" x-text="cap"></span>
                            </template>
                        </div>
                        
                        <!-- Actions -->
                        <div class="flex gap-2 border-t border-slate-800 pt-3">
                            <button class="flex-1 bg-tg_btn text-tg_btn_text py-1.5 rounded text-xs font-medium flex justify-center items-center gap-1" @click="tg.HapticFeedback.impactOccurred('light')">
                                <i data-lucide="play" class="w-3 h-3"></i> Deploy
                            </button>
                            <button class="flex-1 bg-slate-800 text-slate-300 py-1.5 rounded text-xs font-medium flex justify-center items-center gap-1" @click="tg.HapticFeedback.impactOccurred('light')">
                                <i data-lucide="list-video" class="w-3 h-3"></i> Logs
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Tab: Sandbox / Hardware -->
        <div x-show="currentTab === 'sandbox'" x-transition style="display: none;">
            <h2 class="text-xs font-semibold text-tg_hint uppercase tracking-widest mb-4">Sandbox & Hardware</h2>
            <div class="glass-card rounded-xl border border-slate-800 overflow-hidden">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/50">
                    <span class="text-xs font-mono text-tg_hint">Kernel Status</span>
                    <span class="text-xs font-medium text-green-400">ONLINE</span>
                </div>
                <div class="grid grid-cols-2 gap-px bg-slate-800">
                    <div class="bg-tg_bg p-4 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-tg_hint uppercase mb-1">CPU Load</span>
                        <span class="text-xl font-bold font-mono" :class="sysStats.cpu > 80 ? 'text-red-400' : 'text-tg_text'" x-text="sysStats.cpu + '%'"></span>
                    </div>
                    <div class="bg-tg_bg p-4 flex flex-col items-center justify-center">
                        <span class="text-[10px] text-tg_hint uppercase mb-1">RAM (Iso)</span>
                        <span class="text-xl font-bold font-mono" :class="sysStats.ram > 80 ? 'text-red-400' : 'text-tg_text'" x-text="sysStats.ram + '%'"></span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Floating Command Palette Activator -->
    <div class="fixed bottom-6 right-6">
        <button @click="openCommandPalette()" class="w-14 h-14 rounded-full bg-tg_btn shadow-lg shadow-tg_btn/50 flex items-center justify-center text-white transition-transform active:scale-95">
            <i data-lucide="terminal-square" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Initialization Script -->
    <script>
        function nexumApp() {
            return {
                tg: window.Telegram.WebApp,
                currentTab: 'agents',
                sysStats: { cpu: 0, ram: 0, disk: 0 },
                agents: [], // سيتم جلبهم من الباك إند
                
                async fetchAgents() {
                    try {
                        let res = await fetch('/api/agents');
                        let data = await res.json();
                        // أضف أيقونات افتراضية بناء للمسمى
                        this.agents = data.map(a => ({
                            ...a,
                            icon: a.name.includes('Frontend') ? 'layout-template' : (a.name.includes('Infra') ? 'server' : 'cpu')
                        }));
                    } catch (e) {
                        console.error('Failed to fetch agents:', e);
                    }
                },
                
                startRealtimeStream() {
                    const evtSource = new EventSource('/api/system/stream');
                    evtSource.onmessage = (event) => {
                        this.sysStats = JSON.parse(event.data);
                    };
                },

                init() {
                    this.tg.expand();
                    this.tg.ready();
                    this.fetchAgents();
                    this.startRealtimeStream();
                    setTimeout(() => lucide.createIcons(), 100);
                },
                openCommandPalette() {
                    this.tg.HapticFeedback.impactOccurred('medium');
                    this.tg.showPopup({
                        title: 'Command Palette',
                        message: 'Select an action to dispatch to the Orchestrator:',
                        buttons: [
                            {id: 'deploy_front', type: 'default', text: '⚡ Spawn Frontend Builder'},
                            {id: 'run_audit', type: 'default', text: '🛡️ Run Security Audit'},
                            {type: 'cancel'}
                        ]
                    }, async (buttonId) => {
                        if (buttonId === 'deploy_front') {
                            this.triggerOrchestrator('ابن واجهة تفاعلية جديدة');
                        } else if (buttonId === 'run_audit') {
                            this.triggerOrchestrator('قم بعمل فحص أمني للنظام');
                        }
                    });
                },
                
                async triggerOrchestrator(goal) {
                    this.tg.HapticFeedback.impactOccurred('rigid');
                    try {
                        let res = await fetch('/api/orchestrate', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ goal })
                        });
                        let data = await res.json();
                        this.tg.showAlert(`✅ تم بدء البروتوكول: ${data.protocol_id || 'Success'}`);
                    } catch (e) {
                        this.tg.showAlert(`❌ فشل الاتصال بالأوركستريتور`);
                    }
                }
            }
        }
    </script>
</body>
</html>
