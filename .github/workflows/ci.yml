name: Nexum CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pydantic-settings
          
      - name: Setup Mock Storage for Nexum Core (Hermes Auto-Fix)
        run: |
          mkdir -p storage/memory storage/sovereign_memory agents/generated docs
          [[ ! -f storage/agent_registry.json ]] && echo "{}" > storage/agent_registry.json
          [[ ! -f storage/memory/context.json ]] && echo "[]" > storage/memory/context.json
          [[ ! -f storage/sovereign_memory/evolution_history.json ]] && echo "[]" > storage/sovereign_memory/evolution_history.json

      - name: Run tests
        run: pytest tests/ -v
        
      - name: Check Security (Bandit)
        run: |
          pip install bandit
          bandit -r nexum/ -ll
          
      - name: Leak Check (.env)
        run: |
          if [ -f .env ]; then
            echo "🚨 CRITICAL: .env file found in repository!"
            exit 1
          fi
