name: Nexum CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest pydantic-settings
          
      - name: Run tests
        run: pytest tests/ -v
        
      - name: Check Security (Bandit)
        run: |
          pip install bandit
          bandit -r nexum/ -ll
          
      - name: Leak Check (.env)
        run: |
          if [ -f .env ]; then
            echo "🚨 CRITICAL: .env file found in repository!"
            exit 1
          fi
