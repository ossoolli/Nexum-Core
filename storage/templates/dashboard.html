<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{PROJECT_NAME} | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #38bdf8;
            --text: #f1f5f9; --text-dim: #94a3b8; --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--surface); border-left: 1px solid var(--border); padding: 24px; }
        .sidebar h2 { color: var(--accent); margin-bottom: 32px; font-size: 20px; }
        .nav-item { padding: 12px; color: var(--text-dim); cursor: pointer; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(56, 189, 248, 0.1); color: var(--accent); }

        /* Main Content */
        .main { flex: 1; padding: 32px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-card .label { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: var(--accent); }

        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-container { background: var(--surface); padding: 24px; border-radius: 16px; border: 1px solid var(--border); }
        
        h3 { margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>{PROJECT_NAME}</h2>
        <div class="nav-item active">🏠 الرئيسية</div>
        <div class="nav-item">📈 التقارير</div>
        <div class="nav-item">👥 المستخدمين</div>
        <div class="nav-item">⚙️ الإعدادات</div>
    </div>
    
    <div class="main">
        <div class="header">
            <h1>لوحة التحكم</h1>
            <div style="color: var(--text-dim)">{CURRENT_DATE}</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="label">إجمالي الزيارات</div><div class="value">{TOTAL_VISITS}</div></div>
            <div class="stat-card"><div class="label">المستخدمين النشطين</div><div class="value">{ACTIVE_USERS}</div></div>
            <div class="stat-card"><div class="label">إجمالي المبيعات</div><div class="value">{TOTAL_SALES}</div></div>
            <div class="stat-card"><div class="label">معدل التحويل</div><div class="value">{CONV_RATE}%</div></div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>نظرة عامة على النمو</h3>
                <canvas id="growthChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>توزيع المستخدمين</h3>
                <canvas id="distChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx1 = document.getElementById('growthChart').getContext('2d');
        new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'النمو الشهري',
                    data: [12, 19, 3, 5, 2, 3],
                    borderColor: '#38bdf8',
                    tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        const ctx2 = document.getElementById('distChart').getContext('2d');
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['مباشر', 'إحالة', 'بحث'],
                datasets: [{
                    data: [30, 20, 50],
                    backgroundColor: ['#38bdf8', '#7b61ff', '#00e676']
                }]
            }
        });
    </script>
</body>
</html>
